---
# tier-1.yml — rust fmt + clippy + test
#
# replaced fc-plugin approach: the woodpecker-fc-plugin SSE stream
# hard-times-out at 30s (confirmed exit_code=3, "operation timed out")
# while the microvm is still running. root cause is a missing keepalive
# on the fc-pool SSE endpoint — not a code bug. fix: use standard
# rust:1-slim steps directly on the woodpecker agent instead.
#
# workspace root is the repo root (Cargo.toml references src/ member).
# all cargo commands run from root so workspace resolver applies.
# image: rust:1.87-slim (glibc-based, required for aws_signing_helper
# compat — not relevant here but enforced per template rule #2).

when:
  - event: [pull_request, push, manual]
    branch: main
    path:
      include:
        - Cargo.toml
        - Cargo.lock
        - src/**
        - tests/**
        - .woodpecker/**

steps:
  - name: fmt
    image: rust:1.87-slim
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: clippy
    image: rust:1.87-slim
    commands:
      - apt-get update -qq && apt-get install -y -qq --no-install-recommends ca-certificates pkg-config libssl-dev git >/dev/null
      - rustup component add clippy
      - cargo clippy --all-targets -- -D warnings

  - name: test
    image: rust:1.87-slim
    depends_on: [clippy]
    commands:
      - apt-get update -qq && apt-get install -y -qq --no-install-recommends ca-certificates pkg-config libssl-dev git >/dev/null
      - cargo test --locked --no-fail-fast
